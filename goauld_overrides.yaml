# Runtime correction overlay for the Goa'uld Translator.
#
# This file is intentionally small and curated. The app loads it after
# goauld_lexicon.yaml so deterministic translation fixes remain data-driven
# instead of being hidden as code-only gap-fills.
metadata:
  purpose: "Translation-quality runtime overrides"
  created: "2026-06-15"
  source_plan: "plans/uebersetzungsqualitaet-app-plan.md"

entries:
  app_override_tau_ri_humans:
    term: "Tau'ri"
    variants: ["tau'ri"]
    register: canon
    priority: 110
    morphology:
      type: compound
      components: [tau, ri]
    senses:
      - id: app-human-earth-default
        pos: noun
        category: "Runtime translation overrides"
        context: "Default Stargate-context rendering for Earth humans / people of Earth."
        glosses:
          de: [mensch, menschen, erdmensch, erdmenschen, menschen der erde]
          en: [human, humans, earth human, earth humans, people of earth]
        source:
          tier: canon_series
          ref: "App override: prefer canon Tau'ri for default human lookup"
        priority: 110

  app_override_tar_generic_human:
    term: Tar
    variants: [tar]
    register: canon
    priority: 84
    morphology:
      type: root
    senses:
      - id: app-human-generic
        pos: noun
        category: "Runtime translation overrides"
        context: "Generic/neutral human or human slave, not specifically Tau'ri."
        glosses:
          de: [menschlich, generischer mensch, menschlicher sklave, sklave]
          en: [generic human, human slave, slave, human (generic)]
        source:
          tier: canon_rpg
          ref: "App override: keep Tar for generic/slave contexts"
        priority: 84

  app_override_tap_tar_humanity:
    term: "Tap'tar"
    variants: ["tap'tar"]
    register: fanon
    priority: 95
    morphology:
      type: compound
      components: [tap, tar]
    senses:
      - id: app-humanity-collective
        pos: noun
        category: "Runtime translation overrides"
        context: "Collective humanity, humankind, or a people/race as a whole."
        glosses:
          de: [menschheit, menschenvolk, volk der menschen, menschliche rasse]
          en: [humanity, humankind, human race, human people]
        source:
          tier: fanon_strict
          ref: "App override: Tap'tar is collective humanity/people"
        priority: 95

  app_override_negation_ia:
    term: ia
    variants: [ia]
    register: canon
    priority: 105
    senses:
      - id: app-sentence-negation
        pos: negation
        category: "Runtime translation overrides"
        context: "Sentence negation before verb or predicate."
        glosses:
          de: [nicht]
          en: [not, "don't", dont, do not, does not, did not]
        source:
          tier: canon_rda
          ref: "App override: preserve sentence negation"
        priority: 105

  app_override_negation_ka:
    term: Ka
    variants: [ka]
    register: canon
    priority: 102
    senses:
      - id: app-nominal-negation
        pos: negation
        category: "Runtime translation overrides"
        context: "No/none/kein in nominal contexts and standalone answers."
        glosses:
          de: [kein, keine, keinen, keinem, keiner, keines, nein]
          en: ["no", none, not any]
        source:
          tier: canon_rda
          ref: "App override: keep nominal negation distinct from sentence negation"
        priority: 102

  app_override_attack_phrase:
    term: "Tal shak!"
    variants: ["tal shak"]
    register: canon
    priority: 86
    senses:
      - id: app-attack-imperative
        pos: verb
        category: "Runtime translation overrides"
        context: "Imperative attack phrase."
        phrase_exact: true
        glosses:
          de: [greift an, angreifen, greife an, greif an, attackieren]
          en: [attack, attack them, attack now]
        source:
          tier: canon_series
          ref: "App override: attack imperative"
        priority: 86

  app_override_peace_phrase:
    term: "Re Dan'kal'sha"
    variants: ["re dan'kal'sha"]
    register: fanon
    priority: 72
    senses:
      - id: app-come-in-peace
        pos: phrase
        category: "Runtime translation overrides"
        context: "Useful literal transfer phrase for 'come in peace'."
        phrase_exact: true
        glosses:
          de: [kommen in frieden, wir kommen in frieden]
          en: [come in peace, we come in peace]
        source:
          tier: fanon_strict
          ref: "App override: literal phrase transfer"
        priority: 72
